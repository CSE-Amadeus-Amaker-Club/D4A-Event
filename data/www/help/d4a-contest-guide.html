    #md-content {

    #md-content h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 8px; margin-top: 0; }

    #md-content table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 0.9em; }
    #md-content th { background: #3498db; color: white; padding: 8px 12px; text-align: left; }
    #md-content td { padding: 7px 12px; border-bottom: 1px solid #eee; }
    #md-content tr:nth-child(even) td { background: #f9f9f9; }
    #md-content a { color: #3498db; }
    #md-content blockquote { border-left: 4px solid #3498db; margin: 12px 0; padding: 8px 16px; background: #f0f8ff; color: #555; }
    #md-content ul, #md-content ol { padding-left: 24px; }
    #md-content li { margin: 3px 0; }
    #md-content hr { border: none; border-top: 1px solid #ddd; margin: 20px 0; }
    .docs-nav { max-width: 900px; margin: 8px auto; display: flex; flex-wrap: wrap; gap: 6px; }
    .docs-nav a { background: rgba(255,255,255,0.7); padding: 4px 10px; border-radius: 4px; text-decoration: none; color: #2980b9; font-size: 0.85em; transition: background 0.15s; }

    .docs-nav a.active { background: #3498db; color: white; }
