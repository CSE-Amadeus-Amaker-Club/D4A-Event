<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rolling Logs - aMaker</title>
  <link rel="stylesheet" href="./amaker.css">
    <link rel="stylesheet" href="./LogService.css">
</head>
<body>
  <nav class="topnav">
    <a href="./index.html">🧠 Bot</a>
    <a href="./ServoService.html">🛵 Moves</a>
    <a href="./CamService.html">📷 Cam</a>
    <a href="./LogService.html" class="active">📖 Logs</a>
    <a href="./MetricService.html">📊 Metrics</a>
    <a href="./MusicService.html">🎵 Music</a>
    <a href="./LedService.html">💡 LEDs</a>
  </nav>
  <h1 id="pageTitle">📖 Rolling Logs <span id="titleStatus" style="font-size: 0.6em; color: #999;"></span></h1>
  
  <div class="controls">
    <button class="btn btn-primary" onclick="refreshLogs()">🔄 Refresh Now</button>
    <button class="btn btn-secondary" onclick="exportLogs()">💾 Export All Logs</button>
    
    <div class="auto-refresh-control">
      <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()">
      <label for="autoRefresh">Auto-refresh every 0.5s</label>
    </div>
    
    <div class="filter-controls">
      <span style="color: #888;">Filter:</span>
      <button class="filter-btn active" data-level="TRACE" onclick="toggleFilter('TRACE')">TRACE</button>
      <button class="filter-btn active" data-level="DEBUG" onclick="toggleFilter('DEBUG')">DEBUG</button>
      <button class="filter-btn active" data-level="INFO" onclick="toggleFilter('INFO')">INFO</button>
      <button class="filter-btn active" data-level="WARNING" onclick="toggleFilter('WARNING')">WARNING</button>
      <button class="filter-btn active" data-level="ERROR" onclick="toggleFilter('ERROR')">ERROR</button>
    </div>
  </div>

  <div id="logContainer" class="log-container">
    <div class="loading">Loading logs...</div>
  </div>
  
  <script src="./common.js"></script>
  <script src="./LogService.js"></script>
  <div class="statusbar">
    <span class="status-left" id="page-status"></span>
    <span class="status-right">📖 Logs</span>
  </div>
</body>
</html>
