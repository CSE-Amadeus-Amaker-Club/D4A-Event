; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
; no reorg => recruitment 10-20 CBS and new manager alexandre maria temporary
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:unihiker_k10]
platform = unihiker
board = unihiker_k10
framework = arduino
monitor_speed = 115200
test_build_src = yes
board_build.filesystem = littlefs
; extra_scripts = pre:scripts/compress_data.py
board_upload.flash_size = 16MB
board_upload.filesystem_partition = voice_data
custom_sdkconfig = CONFIG_LWIP_MAX_ACTIVE_TCP=32

build_unflags =
	-std=gnu++11
	-std=gnu++14
	-std=c++11
	-std=c++14

build_flags = 
	-std=gnu++17
	-I${PROJECT_INCLUDE_DIR}
	-DCORE_DEBUG_LEVEL=ESP_LOG_DEBUG
	-DLOG_LOCAL_LEVEL=ESP_LOG_DEBUG ; 0 None, 1 Error, 2 Warn, 3 Info, 4 Debug, 5 Verbose
	-DCONFIG_LOG_COLORS=0
	-DVERBOSE_DEBUG=1 ; Enable verbose logging throughout the application
	-DSERVO_VERBOSE_DEBUG=1
	-DCONFIG_ASYNC_TCP_RUNNING_CORE=1
	-DCONFIG_ASYNC_TCP_MAX_ACK_TIME=3000
	-DWS_MAX_QUEUED_MESSAGES=64 ; Increase WebSocket queue size (default 32) to handle burst traffic
	-DMOTOR_SERVO_SERVICE_LOG_LEVEL=ESP_LOG_DEBUG
	; -DCONFIG_ESP32_SPIRAM_SUPPORT=y ; for https://github.com/espressif/esp32-camera
lib_deps = 
	Preferences@^2.0.0
	https://github.com/bblanchon/ArduinoJson.git	
	https://github.com/ESP32Async/ESPAsyncWebServer.git
	https://github.com/ESP32Async/AsyncTCP.git
	bitbank2/PNGdec @ ^1.0.3
	; johnosbb/MicroTFLite @ ^1.0.4 --- IGNORE ---
	; esp32-camera ;' for https://github.com/espressif/esp32-camera
